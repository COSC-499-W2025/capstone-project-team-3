name: Build Backend Sidecar

on:
  workflow_dispatch:
  workflow_call:
  pull_request:
    branches: [main, master, deployment2]
  push:
    branches: [main, master, deployment2]

jobs:
  build-backend-sidecar:
    name: Build sidecar (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: backend-sidecar-macos
            output_binary: backend-sidecar
          - os: ubuntu-latest
            artifact_name: backend-sidecar-linux
            output_binary: backend-sidecar
          - os: windows-latest
            artifact_name: backend-sidecar-windows
            output_binary: backend-sidecar.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # PyInstaller + sentence-transformers/torch/spaCy needs several GB; Linux runners often hit ENOSPC
      # without freeing preinstalled SDK images (same pattern as ci.yml python-tests). Skip on Windows
      # (different paths/shell); macOS matrix builds are usually fine without this.
      - name: Free disk space on runner (CI-only)
        if: runner.os == 'Linux'
        run: |
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/google-cloud-sdk || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python build dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python - <<'PY'
          import re
          from pathlib import Path
          text = Path("requirements.txt").read_text(encoding="utf-8")
          if re.search(r"(?m)^numpy==1\.", text):
              raise SystemExit(
                  "requirements.txt still pins NumPy 1.x; thinc 8.3 needs NumPy 2.x. "
                  "Check the branch/commit GitHub checked out for this workflow."
              )
          PY
          python -m pip install --no-cache-dir "numpy==2.2.6"
          python -m pip install --no-cache-dir -r requirements.txt
          python -m pip install --no-cache-dir pyinstaller

      - name: Verify NumPy 2.x (required by thinc 8.3 / spaCy 3.8)
        run: |
          python -c "import numpy as np; v=tuple(map(int, np.__version__.split('.')[:2])); assert v>=(2,0), f'expected NumPy >= 2.0, got {np.__version__}'"

      - name: Build standalone backend
        run: |
          # backend-sidecar.spec bundles static assets, spaCy/thinc, KeyBERT stack metadata, pygount, etc.
          pyinstaller --noconfirm --clean backend-sidecar.spec

      - name: Verify built binary exists
        shell: bash
        run: |
          if [ ! -f "dist/backend-sidecar/${{ matrix.output_binary }}" ]; then
            echo "Expected binary not found: dist/backend-sidecar/${{ matrix.output_binary }}"
            exit 1
          fi

      - name: Upload backend sidecar artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/backend-sidecar
