name: Release Desktop App

on:
  release:
    types: [published]
  workflow_dispatch:
  # GitHub only lists manual "Run workflow" / `gh workflow run` for workflows on the default
  # branch. This push rule runs the same pipeline from `deployment2` when you push here.
  push:
    branches:
      - deployment2
    paths:
      - ".github/workflows/release-desktop.yml"
      - "requirements.txt"
      - "backend-sidecar.spec"
      - "app/**"
      - "desktop/**"
      - "tests/**"

jobs:
  build-backend-sidecar:
    name: Build backend (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            backend_artifact: backend-sidecar-macos
            output_binary: backend-sidecar
            platform_dir: darwin
          - os: ubuntu-latest
            backend_artifact: backend-sidecar-linux
            output_binary: backend-sidecar
            platform_dir: linux
          - os: windows-latest
            backend_artifact: backend-sidecar-windows
            output_binary: backend-sidecar.exe
            platform_dir: win32

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python build dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python - <<'PY'
          import re
          from pathlib import Path
          text = Path("requirements.txt").read_text(encoding="utf-8")
          if re.search(r"(?m)^numpy==1\.", text):
              raise SystemExit(
                  "requirements.txt still pins NumPy 1.x; thinc 8.3 needs NumPy 2.x. "
                  "Check the branch/commit GitHub checked out for this workflow."
              )
          PY
          python -m pip install --no-cache-dir "numpy==2.2.6"
          python -m pip install --no-cache-dir -r requirements.txt
          python -m pip install --no-cache-dir pyinstaller

      - name: Build backend sidecar binary
        run: |
          pyinstaller --noconfirm --clean backend-sidecar.spec

      - name: Upload backend sidecar
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.backend_artifact }}
          path: dist/backend-sidecar

  build-desktop:
    name: Build desktop installer (${{ matrix.os }})
    needs: build-backend-sidecar
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            backend_artifact: backend-sidecar-macos
            platform_dir: darwin
            output_artifact: desktop-release-macos
          - os: ubuntu-latest
            backend_artifact: backend-sidecar-linux
            platform_dir: linux
            output_artifact: desktop-release-linux
          - os: windows-latest
            backend_artifact: backend-sidecar-windows
            platform_dir: win32
            output_artifact: desktop-release-windows

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json

      - name: Download backend sidecar artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.backend_artifact }}
          path: desktop/resources/backend/${{ matrix.platform_dir }}

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Build desktop app installer
        working-directory: desktop
        run: npm run build

      - name: Upload desktop build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output_artifact }}
          path: desktop/release/**/*

  publish-release-assets:
    name: Publish release assets
    if: github.event_name == 'release'
    needs: build-desktop
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all desktop artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-release

      # GitHub rejects any single release asset ≥ 2 GiB. PyInstaller + ML stack DMGs often exceed that.
      # Upload files under the cap; skip oversize and attach a note pointing testers to workflow Artifacts.
      - name: Upload assets to GitHub Release (2 GiB max per file)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ github.event.release.tag_name }}"
          repo="${{ github.repository }}"
          max=$((2147483648 - 1))
          uploaded=0
          note=""
          while IFS= read -r -d '' f; do
            size=$(stat -c%s "$f")
            base=$(basename "$f")
            if [ "$size" -le "$max" ]; then
              echo "Uploading $base ($size bytes)"
              gh release upload "$tag" "$f" --repo "$repo" --clobber
              uploaded=$((uploaded + 1))
            else
              echo "::warning::Skipping $base ($size bytes) — over GitHub's 2 GiB release-asset limit. Use this workflow run's Artifacts to download it."
              note="${note}- ${base} (${size} bytes)"$'\n'
            fi
          done < <(find dist-release -type f \( -name '*.dmg' -o -name '*.exe' -o -name '*.AppImage' -o -name '*.deb' \) -print0)

          if [ "$uploaded" -eq 0 ]; then
            echo "::error::No installer was under 2 GiB — nothing uploaded to the release. Download desktop-release-* from the workflow run Artifacts, or reduce the sidecar bundle size."
            exit 1
          fi

          if [ -n "$note" ]; then
            {
              echo "Some installers were too large for GitHub Releases (2 GiB maximum per file)."
              echo ""
              echo "${note}"
              echo "Download those builds from: Actions → this workflow run → Artifacts (desktop-release-macos, desktop-release-windows, desktop-release-linux)."
            } > dist-release/README-OVERSIZE-INSTALLERS.txt
            gh release upload "$tag" dist-release/README-OVERSIZE-INSTALLERS.txt --repo "$repo" --clobber
          fi
