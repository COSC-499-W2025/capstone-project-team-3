name: Release Desktop App

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-backend-sidecar:
    name: Build backend (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            backend_artifact: backend-sidecar-macos
            output_binary: backend-sidecar
            platform_dir: darwin
          - os: ubuntu-latest
            backend_artifact: backend-sidecar-linux
            output_binary: backend-sidecar
            platform_dir: linux
          - os: windows-latest
            backend_artifact: backend-sidecar-windows
            output_binary: backend-sidecar.exe
            platform_dir: win32

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir -r requirements.txt
          python -m pip install --no-cache-dir pyinstaller

      - name: Build backend sidecar binary
        run: |
          pyinstaller --noconfirm --clean backend-sidecar.spec

      - name: Upload backend sidecar
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.backend_artifact }}
          path: dist/backend-sidecar

  build-desktop:
    name: Build desktop installer (${{ matrix.os }})
    needs: build-backend-sidecar
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            backend_artifact: backend-sidecar-macos
            platform_dir: darwin
            output_artifact: desktop-release-macos
          - os: ubuntu-latest
            backend_artifact: backend-sidecar-linux
            platform_dir: linux
            output_artifact: desktop-release-linux
          - os: windows-latest
            backend_artifact: backend-sidecar-windows
            platform_dir: win32
            output_artifact: desktop-release-windows

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json

      - name: Download backend sidecar artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.backend_artifact }}
          path: desktop/resources/backend/${{ matrix.platform_dir }}

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Build desktop app installer
        working-directory: desktop
        run: npm run build

      - name: Upload desktop build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output_artifact }}
          path: desktop/release/**/*

  publish-release-assets:
    name: Publish release assets
    if: github.event_name == 'release'
    needs: build-desktop
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all desktop artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-release

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-release/**/*.dmg
            dist-release/**/*.exe
            dist-release/**/*.AppImage
            dist-release/**/*.deb
